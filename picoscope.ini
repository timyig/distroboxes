[picoscope]
image=ubuntu:24.04
init_hooks="sudo apt-get update && sudo apt-get install -y wget gpg"
init_hooks="wget -O- https://labs.picotech.com/Release.gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/picotech-archive-keyring.gpg > /dev/null"
init_hooks="echo 'deb [signed-by=/usr/share/keyrings/picotech-archive-keyring.gpg] https://labs.picotech.com/picoscope7/debian/ picoscope main' | sudo tee /etc/apt/sources.list.d/picoscope7.list"
init_hooks="sudo apt-get update && sudo apt-get install -y picoscope"
exported_apps="/usr/share/applications/picotech-picoscope.desktop"
exported_bins="/usr/bin/picoscope"
